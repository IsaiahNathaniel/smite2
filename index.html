<!DOCTYPE html>
<html lang="en">
<head>
    <title>JSON Product Database</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; cursor: pointer; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Product Database</h2>
    
    <button onclick="sortData('name')">Sort by Name</button>
    <button onclick="sortData('price')">Sort by Price</button>

    <table>
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price ($)</th>
            </tr>
        </thead>
        <tbody id="database-content">
            </tbody>
    </table>

    <script src="superliiga.js"></script>
</body>
</html>
